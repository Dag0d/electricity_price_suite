refresh_timeline:
  name: Refresh timeline
  description: Refresh today and tomorrow slots from configured sources and merge by priority.
  target:
    entity:
      domain: sensor
  fields:
    sources:
      required: false
      description: Optional temporary source override list for this call only.
      example: "[{\"id\": \"primary_action\", \"type\": \"entity_action\", \"priority\": 0, \"response_path\": \"prices.home\", \"slot_mapping\": {\"time_key\": \"start_time\", \"price_key\": \"price\"}}]"
      selector:
        object: {}
    overwrite:
      required: false
      description: If true, delete currently stored rows for today and tomorrow before fetching. Use this for explicit fresh re-fetches after tests or manual injections.
      example: "false"
      selector:
        boolean: {}

add_source:
  name: Add source
  description: Add or update one pull source in the timeline source chain.
  target:
    entity:
      domain: sensor
  fields:
    id:
      required: true
      description: Unique source identifier inside the selected timeline.
      example: "primary_action"
      selector:
        text: {}
    priority:
      required: false
      description: Source priority (lower number wins in conflicts).
      example: "0"
      selector:
        number:
          min: 0
          max: 9999
          mode: box
    source_type:
      required: true
      description: Pull source mode. Use entity_attribute for attributes or entity_action for service responses.
      example: "entity_action"
      selector:
        select:
          options:
            - "entity_attribute"
            - "entity_action"
    source_entity_id:
      required: false
      description: Entity used by the source (required for entity_attribute, optional for entity_action).
      example: "sensor.market_data_total_price"
      selector:
        entity: {}
    attribute:
      required: false
      description: Attribute name that contains slot rows (entity_attribute only).
      example: "data"
      selector:
        text: {}
    action:
      required: false
      description: Service action to call (entity_action only), format domain.service.
      example: "tibber.get_prices"
      selector:
        text: {}
    response_path:
      required: false
      description: Dotted path to slot list in the action response.
      example: "prices.tibber-home"
      selector:
        text: {}
    request_payload:
      required: false
      description: Additional payload forwarded to the action call.
      example: "{}"
      selector:
        object: {}
    time_key:
      required: false
      description: Key name used for slot start datetime in each row.
      example: "start_time"
      selector:
        text: {}
    price_key:
      required: false
      description: Key name used for price value in each row.
      example: "price_per_kwh"
      selector:
        text: {}
    inject_time_window:
      required: false
      description: Auto-inject start/end values for today and tomorrow into action payload.
      example: "true"
      selector:
        boolean: {}
    start_key:
      required: false
      description: Payload key to write injected start datetime into.
      example: "start"
      selector:
        text: {}
    end_key:
      required: false
      description: Payload key to write injected end datetime into.
      example: "end"
      selector:
        text: {}
    time_format:
      required: false
      description: Datetime format for injected start/end values.
      example: "%Y-%m-%d %H:%M:%S"
      selector:
        text: {}

list_sources:
  name: List sources
  description: List source IDs, or one source config when id is provided.
  target:
    entity:
      domain: sensor
  fields:
    id:
      required: false
      description: Optional source id. If omitted, only ids and count are returned.
      example: "primary_action"
      selector:
        text: {}

delete_source:
  name: Delete source
  description: Delete one source from the timeline source chain by id.
  target:
    entity:
      domain: sensor
  fields:
    id:
      required: true
      description: Source id to remove.
      example: "fallback_attribute"
      selector:
        text: {}

inject_slots:
  name: Inject slots
  description: Inject normalized slots directly into the timeline store.
  target:
    entity:
      domain: sensor
  fields:
    slots:
      required: true
      description: Slot list. Each item needs start_time and price_per_kwh.
      example: "[{\"start_time\": \"2026-03-06T12:00:00+01:00\", \"price_per_kwh\": 0.2987}]"
      selector:
        object: {}
    source_name:
      required: false
      description: Source id stored with injected rows.
      example: "manual_inject"
      selector:
        text: {}
    source_priority:
      required: false
      description: Priority rank for injected rows (lower rank replaces higher rank).
      example: "9999"
      selector:
        number:
          min: 0
          max: 9999
          mode: box
    is_primary:
      required: false
      description: Mark injected rows as primary-source rows.
      example: "false"
      selector:
        boolean: {}
    overwrite:
      required: false
      description: If true, delete stored rows for the same local dates before injecting the new rows.
      example: "false"
      selector:
        boolean: {}

optimize_device:
  name: Optimize device
  description: Compute best start time from stored timeline prices.
  target:
    entity:
      domain: sensor
  fields:
    device_name:
      required: true
      description: Logical device label used to build and persist the plan entity.
      example: "Dishwasher"
      selector:
        text: {}
    duration_minutes:
      required: false
      description: Runtime duration in minutes. Provide this, a manual energy profile, or an internal logger profile.
      example: "170"
      selector:
        number:
          min: 1
          max: 2880
          mode: box
    energy_profile:
      required: false
      description: Optional direct profile list of weights or energy segments.
      example: "[0.2, 1.0, 0.8, 0.3]"
      selector:
        object: {}
    profile_slot_minutes:
      required: false
      description: Minutes per profile segment in energy_profile.
      example: "5"
      selector:
        number:
          min: 1
          max: 60
          mode: box
    billing_slot_minutes:
      required: false
      description: Override billing slot length. If omitted, it is detected from timeline data.
      example: "15"
      selector:
        number:
          min: 1
          max: 120
          mode: box
    profile_logger_entity:
      required: false
      description: Meta sensor of an Electricity Price Suite profile logger. Used for direct internal profile loading.
      example: "sensor.dishwasher_neff_profile_logger_meta"
      selector:
        entity:
          domain: sensor
    program_key:
      required: false
      description: Program key to load from the selected profile logger, for example auto_2.
      example: "auto_2"
      selector:
        text: {}
    program_display_name:
      required: false
      description: Optional display name stored with the plan, for example Auto 2 [I,D,S]. This does not change the technical program key.
      example: "Auto 2 [I,D,S]"
      selector:
        text: {}
    align_start_to_billing_slot:
      required: false
      description: If true, candidate starts are restricted to billing slot boundaries.
      example: "false"
      selector:
        boolean: {}
    max_extra_cost_percent:
      required: false
      description: Maximum extra cost in percent that is still acceptable when prefer_earliest is enabled.
      example: "1"
      selector:
        number:
          min: 0
          max: 100
          step: 0.1
          mode: box
    prefer_earliest:
      required: false
      description: Pick the earliest candidate within the allowed extra-cost threshold instead of the strict minimum.
      example: "true"
      selector:
        boolean: {}
    start_mode:
      required: false
      description: "Start anchor mode: now or in."
      example: "now"
      selector:
        select:
          options:
            - "now"
            - "in"
    start_in_minutes:
      required: false
      description: Offset used when start_mode is in.
      example: "30"
      selector:
        number:
          min: 0
          max: 10080
          mode: box
    deadline_mode:
      required: false
      description: Relative deadline mode.
      example: "finish_within"
      selector:
        select:
          options:
            - "none"
            - "start_within"
            - "finish_within"
    deadline_minutes:
      required: false
      description: Relative deadline value for the selected deadline_mode.
      example: "360"
      selector:
        number:
          min: 0
          max: 10080
          mode: box
    latest_start:
      required: false
      description: Expert override for absolute latest allowed start datetime (ISO). Internally normalized to the optimizer latest-start boundary.
      example: "2026-03-06T21:30:00+01:00"
      selector:
        text: {}
    latest_finish:
      required: false
      description: Expert override for absolute latest allowed finish datetime (ISO). Internally converted to a derived latest start.
      example: "2026-03-06T23:30:00+01:00"
      selector:
        text: {}

manage_plan:
  name: Manage plan
  description: Reset or delete existing plan entities.
  target:
    entity:
      domain: sensor
  fields:
    reset:
      required: false
      description: Reset selected plan entities and clear their planned start without deleting the entity.
      example: "true"
      selector:
        boolean: {}
    delete:
      required: false
      description: Delete selected plan entities and remove persisted plan payload.
      example: "false"
      selector:
        boolean: {}

reoptimize_plan:
  name: Re-optimize plan
  description: Recompute one or more existing plan entities using their stored constraints and current timeline data.
  target:
    entity:
      domain: sensor

start_profile_logging:
  name: Start profile logging
  description: Start a new consumption profile run for the selected profile logger.
  target:
    entity:
      domain: sensor
  fields:
    program_key:
      required: false
      description: Program key to start. Optional when the target is already a program profile entity.
      example: "auto_2"
      selector:
        text: {}

finish_profile_logging:
  name: Finish profile logging
  description: Finish the active run and persist the updated profile.
  target:
    entity:
      domain: sensor
  fields:
    program_key:
      required: false
      description: Program key to finish. Optional when the target is already a program profile entity.
      example: "auto_2"
      selector:
        text: {}

abort_profile_logging:
  name: Abort profile logging
  description: Abort the active run and restore the profile snapshot from before start.
  target:
    entity:
      domain: sensor
  fields:
    reason:
      required: false
      description: Abort reason stored with the logger runtime.
      example: "manual_abort"
      selector:
        select:
          options:
            - "manual_abort"
            - "program_mismatch"
            - "restart_recovery"
            - "sampling_delay_exceeded"
    program_key:
      required: false
      description: Optional program key guard. When set, it must match the active run.
      example: "auto_2"
      selector:
        text: {}

get_consumption_profile:
  name: Get consumption profile
  description: Return the list of known programs, or one stored profile with optional resampling.
  target:
    entity:
      domain: sensor
  fields:
    program_key:
      required: false
      description: Program key to export. If omitted on the meta sensor, the service returns the known program list.
      example: "auto_2"
      selector:
        text: {}
    desired_slot_minutes:
      required: false
      description: Optional resampled slot size. Must be an integer multiple or divisor of the stored slot length.
      example: "15"
      selector:
        number:
          min: 1
          max: 120
          mode: box
    debug:
      required: false
      description: Include debug details in the exported profile payload where available.
      example: "false"
      selector:
        boolean: {}

manage_estimated_runtime:
  name: Manage estimated runtime
  description: Add, delete, list, or clear estimated fallback runtimes for one profile logger.
  target:
    entity:
      domain: sensor
  fields:
    mode:
      required: true
      description: Management mode. Use add, delete, list, or clear.
      example: "add"
      selector:
        select:
          options:
            - "add"
            - "delete"
            - "list"
            - "clear"
    items:
      required: false
      description: Mapping of program_key to duration_minutes used in add mode.
      example: "{\"auto_2\": 180, \"auto_2_i_d_s\": 140}"
      selector:
        object: {}
    program_key:
      required: false
      description: Program key to remove in delete mode.
      example: "auto_2_i_d_s"
      selector:
        text: {}

reset_consumption_profile:
  name: Reset consumption profile
  description: Clear one stored profile but keep the profile entity.
  target:
    entity:
      domain: sensor
  fields:
    program_key:
      required: false
      description: Program key to reset. Optional when the target is already a program profile entity.
      example: "auto_2"
      selector:
        text: {}

delete_consumption_profile:
  name: Delete consumption profile
  description: Delete one stored profile and remove its entity.
  target:
    entity:
      domain: sensor
  fields:
    program_key:
      required: false
      description: Program key to delete. Optional when the target is already a program profile entity.
      example: "auto_2"
      selector:
        text: {}
