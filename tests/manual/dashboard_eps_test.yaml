      - type: grid
        cards:
          - type: heading
            heading: Notes
          - type: markdown
            content: |
              **Timeline harness**
              - Uses `input_select.electricity_price_suite_test_case` and `input_button.electricity_price_suite_run_test`
              - Covers refresh, inject, optimizer, manage_plan, manage_sources, and boundary regression behavior

              **Logger harness**
              - Uses `input_select.electricity_price_suite_logger_test_case` and `input_button.electricity_price_suite_run_logger_test`
              - Uses `input_number.electricity_price_suite_logger_total_kwh` plus the template sensor `sensor.electricity_price_suite_logger_total_kwh`
              - The logger automation waits 5 seconds after helper writes before any read-dependent action
              - Logger run lifecycle tests use `manage_profile_run` with mode-based actions
              - `manage_profile` get-mode test results are written into persistent notifications
              - Additional logger tests cover program listing and full estimated-runtime management
              - Runtime errors should be visible on the logger state and `reason` attribute
